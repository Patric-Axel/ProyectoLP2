<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Getting Started: Serving Web Content</title>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
</head>
<body>

	<div class="container">
		<div class="row">
			<div class="col-6 col-sm-4">
				<h1>Listado de Usuarios</h1>

				<div class="col-6 col-sm-7">
					<h3></h3>
					<table class="table">
						<thead>
							<tr>
								<th>Id</th>
								<th>nombre</th>
								<th>correo</th>
								<th>contraseña</th>
								<th>rol</th>
								<th>estado</th>
								<th>fecha</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="p : ${lstUsuarios}">
								<th scope="row" th:text="${p.id_usuario}">1</th>
								<td th:text="${p.nombre}"></td>
								<td th:text="${p.correo}"></td>
								<td th:text="${p.contrasena}"></td>
								<td th:text="${p.id_rol}"></td>
								<td th:text="${p.getObjRol().getNombre()}"></td>
								<td th:text="${p.getObjEstado().getDescripcion()}"></td>
								<td th:text="${p.fecha_registro}"></td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>
	</div>
</body>
<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
<script
	src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
</html>
